<svg xmlns="http://www.w3.org/2000/svg" width="680" height="825" viewBox="0 0 680 825" role="img" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<title>Modelo de dominio — Alan &amp; Aura Académico (v5)</title>
<desc>Diagrama de clases con 12 clases y 12 relaciones. Se bajaron las cajas Mensaje, Alan y Aura para separar las etiquetas "contiene" y "acompañada por". Administrador controla DisponibilidadDelChatbot (kill switch), que condiciona Conversación. No se dibuja una relación Administrador-Usuario: el directorio y las métricas son casos de uso, no relaciones de dominio. Usuario otorga Consentimiento, posee Cápsula de perfil y mantiene Conversación. La cápsula orienta la conversación, acompañada por un Personaje (especializaciones Alan y Aura) y compuesta de Mensajes. Un mensaje origina un Evento de seguridad que remite a un Recurso de ayuda. El modelo de IA (LLM) no es una clase de dominio: es el mecanismo detrás del Personaje y aparece como actor de sistema externo en los casos de uso.</desc>

<rect x="0" y="0" width="680" height="825" fill="#FFFFFF"/>

<g font-size="14" font-weight="500">
<rect x="150" y="40" width="160" height="46" rx="4" fill="#F1EFE8" stroke="#5F5E5A"/><text x="230" y="69" text-anchor="middle" fill="#2C2C2A">Usuario</text>
<rect x="400" y="40" width="180" height="46" rx="4" fill="#F1EFE8" stroke="#5F5E5A"/><text x="490" y="69" text-anchor="middle" fill="#2C2C2A">Administrador</text>
<rect x="40" y="150" width="150" height="46" rx="4" fill="#EEEDFE" stroke="#534AB7"/><text x="115" y="179" text-anchor="middle" fill="#26215C">Consentimiento</text>
<rect x="210" y="150" width="170" height="46" rx="4" fill="#EEEDFE" stroke="#534AB7"/><text x="295" y="179" text-anchor="middle" fill="#26215C">Cápsula de perfil</text>
<rect x="395" y="150" width="210" height="46" rx="4" fill="#F1EFE8" stroke="#5F5E5A"/><text x="500" y="179" text-anchor="middle" fill="#2C2C2A" font-size="13">Disponibilidad del chatbot</text>
<rect x="230" y="320" width="180" height="46" rx="4" fill="#E1F5EE" stroke="#0F6E56"/><text x="320" y="349" text-anchor="middle" fill="#04342C">Conversación</text>
<rect x="445" y="320" width="160" height="46" rx="4" fill="#E1F5EE" stroke="#0F6E56"/><text x="525" y="349" text-anchor="middle" fill="#04342C">Personaje</text>
<rect x="230" y="475" width="180" height="46" rx="4" fill="#E1F5EE" stroke="#0F6E56"/><text x="320" y="504" text-anchor="middle" fill="#04342C">Mensaje</text>
<rect x="450" y="475" width="70" height="46" rx="4" fill="#E1F5EE" stroke="#0F6E56"/><text x="485" y="504" text-anchor="middle" fill="#04342C">Alan</text>
<rect x="545" y="475" width="70" height="46" rx="4" fill="#E1F5EE" stroke="#0F6E56"/><text x="580" y="504" text-anchor="middle" fill="#04342C">Aura</text>
<rect x="230" y="585" width="200" height="46" rx="4" fill="#FAECE7" stroke="#993C1D"/><text x="330" y="614" text-anchor="middle" fill="#4A1B0C">Evento de seguridad</text>
<rect x="230" y="695" width="200" height="46" rx="4" fill="#FAECE7" stroke="#993C1D"/><text x="330" y="724" text-anchor="middle" fill="#4A1B0C">Recurso de ayuda</text>
</g>

